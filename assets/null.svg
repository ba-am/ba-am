<svg width="700" height="50" viewBox="0 0 700 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css"><![CDATA[
      .status-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #E36209;
        text-anchor: middle;
        opacity: 0;
        transform-origin: 50% 50%;
      }
      @keyframes fadeScale {
        0% { opacity: 0; transform: scale(0.8); }
        5% { opacity: 1; transform: scale(1); }
        25% { opacity: 1; transform: scale(1); }
        30% { opacity: 0; transform: scale(0.8); }
        100% { opacity: 0; transform: scale(0.8); }
      }
      .status-text:nth-of-type(1) {
        animation: fadeScale 16s ease-in-out infinite;
        animation-delay: 0s;
      }
      .status-text:nth-of-type(2) {
        animation: fadeScale 16s ease-in-out infinite;
        animation-delay: 4s;
      }
      .status-text:nth-of-type(3) {
        animation: fadeScale 16s ease-in-out infinite;
        animation-delay: 8s;
      }
      .status-text:nth-of-type(4) {
        animation: fadeScale 16s ease-in-out infinite;
        animation-delay: 12s;
      }
    ]]></style>
  </defs>

  <text x="350" y="32" class="status-text">⚠️ MALWARE SAMPLE CONTAINED AND ANALYZED ⚠️</text>
  <text x="350" y="32" class="status-text">🔬 REVERSE ENGINEERING IN PROGRESS 🔬</text>
  <text x="350" y="32" class="status-text">💀 THREAT NEUTRALIZED SUCCESSFULLY 💀</text>
  <text x="350" y="32" class="status-text">🛡️ SECURITY ASSESSMENT COMPLETE 🛡️</text>
</svg>
